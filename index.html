<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCARPAY // MERCHANT ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Mono', monospace; background-color: #000; color: #fff; }
        .glitch-border { border: 1px solid #333; transition: all 0.3s ease; }
        .glitch-border:hover { border-color: #0066FF; box-shadow: 0 0 10px #0066FF; }
    </style>
</head>
<body class="p-6">

    <header class="mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tighter">SCARPAY <span class="text-blue-600">v1.0</span></h1>
            <p class="text-xs text-gray-500 uppercase">FENG Industries // Uncle Scar</p>
        </div>
        <div class="h-8 w-8 bg-white rounded-full"></div>
    </header>

    <div class="bg-[#111] p-6 rounded-lg mb-6 glitch-border">
        <p class="text-xs text-gray-400 uppercase mb-2">Available Balance</p>
        <h2 class="text-4xl font-bold">$12,450<span class="text-gray-600 text-2xl">.00</span></h2>
        <div class="mt-4 flex gap-2">
            <button class="bg-blue-600 text-white text-xs px-4 py-2 font-bold uppercase hover:bg-white hover:text-black">Withdraw</button>
            <button class="border border-gray-700 text-xs px-4 py-2 font-bold uppercase">Details</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-[#111] p-4 rounded-lg glitch-border text-center">
            <p class="text-[10px] uppercase text-gray-500">Live Links</p>
            <p class="text-xl font-bold">12</p>
        </div>
        <div class="bg-[#111] p-4 rounded-lg glitch-border text-center">
            <p class="text-[10px] uppercase text-gray-500">Active Ghost Accounts</p>
            <p class="text-xl font-bold text-blue-500">04</p>
        </div>
    </div>

    <div>
        <h3 class="text-xs uppercase text-gray-400 mb-4 tracking-widest">Recent Activity</h3>
        
        <div class="flex justify-between items-center py-4 border-b border-[#222]">
            <div>
                <p class="text-sm font-bold">Transfer / United Kingdom</p>
                <p class="text-[10px] text-gray-500">GHOST_ACC_7721 • 2m ago</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-green-500">+$420.00</p>
                <p class="text-[10px] text-gray-500 uppercase">Settled</p>
            </div>
        </div>

        <div class="flex justify-between items-center py-4 border-b border-[#222]">
            <div>
                <p class="text-sm font-bold">Transfer / Nigeria</p>
                <p class="text-[10px] text-gray-500">GHOST_ACC_8890 • 1h ago</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-yellow-500">Pending</p>
                <p class="text-[10px] text-gray-500 uppercase">Awaiting Bank</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 flex justify-around bg-white text-black py-3 rounded-full font-bold text-[10px] uppercase shadow-xl">
        <a href="#">Home</a>
        <a href="#" class="text-blue-600">Payments</a>
        <a href="#">Settings</a>
    </div>

</body>
</html>
